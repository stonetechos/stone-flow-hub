[install]
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@lovable.dev/mcp-js", "@lovable.dev/vite-plugin-dev-server-bridge", "@lovable.dev/vite-plugin-hmr-gate"]

[test]
# `bun test` recursively scans the whole package by default for anything
# matching its test-file naming convention (*.test.*, *.spec.*, ...). Every
# real unit test lives under src/ (see docs/TESTING.md), so scope discovery
# there — otherwise unrelated files elsewhere that happen to match the
# pattern get swept in too, e.g. docs/rc1-e2e.spec.mjs, a standalone
# Playwright smoke script meant to be run on its own via
# `npm run test:e2e`, never as part of the unit suite.
root = "src"
