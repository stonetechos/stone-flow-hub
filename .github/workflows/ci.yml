name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install (frozen lockfile), typecheck, lint, guardrails, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Typecheck tests
        run: npm run typecheck:tests

      - name: Lint
        run: npm run lint

      - name: Verify auth context
        run: npm run verify:auth-context

      - name: Run tests
        run: bun test

      - name: Build
        run: npm run build