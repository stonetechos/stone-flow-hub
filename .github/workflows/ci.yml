name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install (frozen lockfile), typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to match the version used to generate bun.lock locally, so CI
      # resolves dependencies the same way a contributor's machine does.
      # This is a reproducibility pin only — it is not required for the
      # frozen-lockfile check itself to work correctly.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails the build if package.json and bun.lock are out of sync,
      # instead of letting that surface later as a Cloudflare deploy failure.
      - name: Install dependencies (bun install --frozen-lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (vite build)
        run: npm run build
