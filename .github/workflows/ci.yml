```yaml
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install (frozen lockfile), typecheck, lint, guardrails, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to match the version used to generate bun.lock locally, so CI
      # resolves dependencies the same way a contributor's machine does.
      # This is a reproducibility pin only — it is not required for the
      # frozen-lockfile check itself to work correctly.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails the build if package.json and bun.lock are out of sync,
      # instead of letting that surface later as a Cloudflare deploy failure.
      - name: Install dependencies (bun install --frozen-lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      # Tests (and testSupport/ helpers) live under a separate compiler
      # context — tsconfig.test.json — so Bun's globals never leak into the
      # production tsconfig.json above. Both must pass independently; see
      # docs/TESTING.md.
      - name: Typecheck tests (tsc --noEmit -p tsconfig.test.json)
        run: npm run typecheck:tests

      - name: Lint (eslint)
        run: npm run lint

      # Fast, static, no-framework regression guard (see scripts/verify-server-auth-context.mjs) —
      # runs before the test suite since it's a source-text check with no
      # runtime setup cost, and should fail loudest/fastest on the exact
      # regression class it exists to catch (an AI server function silently
      # running unauthenticated, or a VIE action bypassing the approved
      # execution architecture).
      - name: Guardrails (server-auth-context + VIE execution architecture)
        run: npm run verify:auth-context

      - name: Test (bun test)
        run: bun test

      - name: Build (vite build)
        run: npm run build
```