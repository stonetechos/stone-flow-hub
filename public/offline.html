<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>STOS — Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fdfbf7;
        color: #14202b;
        font-family: -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .badge {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #06090d;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px;
        letter-spacing: -0.01em;
      }
      p {
        font-size: 13px;
        line-height: 1.5;
        color: #5b6b74;
        margin: 0 0 20px;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 8px;
        background: #0d9488;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        padding: 9px 18px;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
      .status {
        margin-top: 14px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #93a0a8;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="badge" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(256,266)">
              <path d="M -92 -54 L -46 -100 L 46 -100 L 92 -54 L 0 118 Z" fill="#93CDB3" />
            </g>
          </svg>
        </div>
        <h1>You're offline</h1>
        <p>
          STOS can't reach the network right now. Live business data needs a connection, so
          this page will reload automatically the moment you're back online.
        </p>
        <button type="button" onclick="location.reload()">Try again</button>
        <div class="status" id="status">Waiting for connection…</div>
      </div>
    </div>
    <script>
      // Graceful recovery: auto-reload as soon as connectivity returns,
      // instead of leaving the user stranded on this static page.
      window.addEventListener("online", function () {
        var el = document.getElementById("status");
        if (el) el.textContent = "Back online — reloading…";
        setTimeout(function () {
          location.reload();
        }, 400);
      });
      if (navigator.onLine) {
        var el = document.getElementById("status");
        if (el) el.textContent = "Connection detected — reloading…";
        setTimeout(function () {
          location.reload();
        }, 200);
      }
    </script>
  </body>
</html>
